xgboost:
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  scale_pos_weight: 10
  eval_metric: "aucpr"

lightgbm:
  n_estimators: 500
  max_depth: 7
  learning_rate: 0.05
  num_leaves: 63
  subsample: 0.8
  colsample_bytree: 0.8
  is_unbalance: true
  metric: "average_precision"

catboost:
  iterations: 500
  depth: 6
  learning_rate: 0.05
  auto_class_weights: "Balanced"

stacking:
  cv_folds: 5
  meta_learner: "logistic_regression"

optuna:
  n_trials: 100
  timeout: 3600
  direction: "maximize"
  metric: "average_precision"
